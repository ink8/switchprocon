name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Every build gets a unique, ever-increasing versionCode (= run number) so the
      # in-app updater can tell old from new.
      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon -PbuildNumber=${{ github.run_number }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk SwitchProCon-build-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: switchprocon-apk
          path: SwitchProCon-build-${{ github.run_number }}.apk
          if-no-files-found: error

      # Permanent, versioned history: one Release per build, never deleted.
      # The in-app updater reads /releases/latest and compares the build number.
      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SwitchProCon 0.2.${{ github.run_number }}
          files: SwitchProCon-build-${{ github.run_number }}.apk
          body: |
            Automated build from commit ${{ github.sha }}.
            Install the attached APK, or let the in-app updater fetch it.
